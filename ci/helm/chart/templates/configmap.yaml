{{- if .Values.configMapEnabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ template "social-app.fullname" . }}-server-config
  labels:
    app: {{ template "social-app.name" $ }}
    chart: {{ template "social-app.chart" $ }}
    release: "{{ $.Release.Name }}"
    heritage: "{{ $.Release.Service }}"
data:
  default.conf: |-
    server {
        listen 80;
        client_max_body_size 30M;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Server $host;
        proxy_set_header X-real-ip $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        gzip on;
        gzip_min_length 1k;
        gzip_comp_level 9;
        gzip_types text/plain application/javascript application/x-javascript text/css application/xml text/javascript application/x-httpd-php image/jpeg image/gif image/png;
        gzip_vary on;
        gzip_disable "MSIE [1-6]\.";
        #auth_basic "login";
        #auth_basic_user_file /password;
        root /usr/share/nginx/html;

        location / {
            if ($request_filename ~* .*\.(htm|html)$) {
                add_header Cache-Control "no-store";
            }
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
        location /actuator/health {
            default_type application/json;
            return 200 '{"status":"UP","groups":["liveness","readiness"]}';
        }
    }

{{- end -}}
